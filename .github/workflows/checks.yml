name: checks

on:
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  checks:
    continue-on-error: False
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.15"

      - name: Sub-modules
        run: git submodule update --init --recursive

      - name: Install dependencies
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get autoremove
          sudo apt-get autoclean
          uv sync --frozen
          sudo npm install -g markdown-spellcheck

      - name: Check copyright
        run: uv run tox -e check-copyright

      - name: Check spelling
        run: uv run tox -e spell-check

      - name: Check doc links
        run: uv run tox -e check-doc-links

      - name: markdownlint-cli2-action
        uses: DavidAnson/markdownlint-cli2-action@v9.0.0
        with:
          globs: /docs/*.md # optional, default is *.{md,markdown}

      # Run the submodule version check last so the rest of the suite
      # still reports on every PR even when a downstream submodule
      # cuts a new release between bumps.
      - name: Check submodules' versions
        run: uv run tox -e check-submodules-versions
